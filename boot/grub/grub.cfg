# Keep the menu visible long enough for a first-time user to read it.
set timeout=5
set default=0
set gfxpayload=text

# Standalone UEFI GRUB starts with its embedded memdisk as root. Locate the
# SPFDisk ESP/ISO by its project-specific marker before presenting entries.
search --no-floppy --file --set=root /rspfdisk-media

# The default path is guided. The TUI still owns the explicit
# backup/confirmation gates for any image write.
menuentry "Start Rust SPFDisk guided TUI (recommended)" --id rspfdisk-guided {
    linux /boot/vmlinuz ro init=/init rdinit=/init console=tty0 rspfdisk_mode=guided
    initrd /boot/initramfs.img
}

menuentry "Recovery shell: rspfdisk CLI (advanced)" --id rspfdisk-recovery {
    linux /boot/vmlinuz ro init=/init rdinit=/init console=tty0 rspfdisk_cli=1
    initrd /boot/initramfs.img
}
