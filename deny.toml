# cargo-deny configuration (https://github.com/EmbarkStudios/cargo-deny)

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
notice = "warn"
yanked = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT OR Apache-2.0",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "BSD-3-Clause",
    "OpenSSL",
]

[[licenses.clarify]]
name = "adler2"
expression = "0BSD OR MIT OR Apache-2.0"

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "allow"
deny = []
skip = []
skip-tree = []
